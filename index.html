<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>心理ゲーム分析</title>
<style>
body { font-family: sans-serif; background:#f4f6fb; padding:20px; }
.container { max-width:800px; margin:auto; }
.card { background:white; padding:20px; margin-top:15px; border-radius:10px; }
.primary { border-left:6px solid #4CAF50; }
.secondary { border-left:6px solid #999; }
textarea { width:100%; height:120px; }
button { padding:10px; margin-top:10px; }
</style>
</head>
<body>

<div class="container">
<h2>心理ゲーム分析エンジン</h2>

<textarea id="input"></textarea>

<button onclick="analyze()">分析</button>

<div id="result"></div>
</div>

<script>
async function analyze() {
    const text = document.getElementById("input").value;

    const res = await fetch("YOUR_BACKEND_URL", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({thought: text})
    });

    const data = await res.json();

    const result = document.getElementById("result");
    result.innerHTML = "";

    data.forEach((item, i) => {
        const div = document.createElement("div");
        div.className = "card " + (i === 0 ? "primary" : "secondary");

        div.innerHTML = `
            <h3>${item.game} (${item.probability}%)</h3>
            <p><b>構造:</b> ${item.structure}</p>
            <p>${item.reason_for_prob}</p>
        `;

        result.appendChild(div);
    });
}
</script>

</body>
</html>
