<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理ゲーム・アナライザー</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f7f6; color: #333; line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #2c3e50; font-size: 24px; margin-bottom: 10px; }
        .description { font-size: 14px; color: #7f8c8d; text-align: center; margin-bottom: 25px; }
        textarea { width: 100%; height: 150px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; resize: vertical; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; justify-content: center; }
        select { padding: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px; }
        button { background-color: #3498db; color: white; border: none; padding: 12px 30px; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        #loading { display: none; text-align: center; margin: 20px 0; color: #3498db; font-weight: bold; }
        #result { margin-top: 30px; display: none; }
        .card { background: #f9f9f9; border-left: 5px solid #3498db; padding: 20px; margin-bottom: 20px; border-radius: 4px; }
        .card h3 { margin-top: 0; color: #2980b9; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .label { font-weight: bold; color: #7f8c8d; font-size: 13px; text-transform: uppercase; }
        .value { font-size: 15px; margin-top: 4px; }
        .ok-box { padding: 10px; border-radius: 6px; margin-top: 5px; font-weight: bold; text-align: center; }
        .counseling-box { background: #fff9f0; border: 1px dashed #f39c12; padding: 20px; border-radius: 10px; margin-top: 20px; font-style: italic; }
        .status-msg { font-size: 12px; color: #95a5a6; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>心理ゲーム・アナライザー</h1>
    <p class="description">エリック・バーン著『Games People Play』に基づく、対人関係の無意識分析</p>

    <textarea id="thoughtInput" placeholder="モヤモヤしたやり取りや、繰り返してしまう不快なパターンを入力してください..."></textarea>

    <div class="controls">
        <select id="modeSelect">
            <option value="strict">原典名称モード（厳格）</option>
            <option value="modern">現代名称モード（自由）</option>
        </select>
        <button id="analyzeBtn" onclick="startAnalysis()">分析を開始する</button>
    </div>

    <div id="loading">
        <div id="loadingText">深層心理を解析中...</div>
        <div class="status-msg">※サーバー起動に最大1分かかる場合があります</div>
    </div>

    <div id="result">
        <div class="card">
            <h3 id="gameNameDisplay"></h3>
            <div class="grid">
                <div><span class="label">分析対象</span><div id="subjectDisplay" class="value"></div></div>
                <div><span class="label">対人相手</span><div id="targetDisplay" class="value"></div></div>
            </div>
            <p id="definitionDisplay" style="margin-top:15px;"></p>
        </div>

        <div class="grid">
            <div class="card">
                <h3>心理的プロセス</h3>
                <span class="label">隠された動機</span><div id="motiveDisplay" class="value"></div>
                <br>
                <span class="label">心理的レベルのシナリオ</span><div id="scenarioDisplay" class="value"></div>
            </div>
            <div class="card">
                <h3>OK牧場の変遷</h3>
                <span class="label">開始時</span><div id="posStartDisplay" class="ok-box"></div>
                <br>
                <span class="label">結末（ペイオフ）</span><div id="posEndDisplay" class="ok-box"></div>
            </div>
        </div>

        <div class="card" style="border-left-color: #e74c3c;">
            <h3>Adultとしての処方箋</h3>
            <span class="label">具体的アドバイス</span><div id="adviceDisplay" class="value"></div>
            <br>
            <span class="label">このまま繰り返した場合の予測</span><div id="predictionDisplay" class="value"></div>
        </div>

        <div class="counseling-box">
            <span class="label">Counselor's Message</span>
            <p id="counselingDisplay"></p>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://tomarigi-net-onrender-com.onrender.com/";

    async function startAnalysis() {
        const thought = document.getElementById('thoughtInput').value.trim();
        const mode = document.getElementById('modeSelect').value;
        const btn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');
        const resultDiv = document.getElementById('result');

        if (!thought) return alert("内容を入力してください");

        btn.disabled = true;
        loading.style.display = "block";
        resultDiv.style.display = "none";

        const maxRetries = 2; // リトライ回数
        let lastError = null;

        for (let attempt = 0; attempt <= maxRetries; attempt++) {
            try {
                if (attempt > 0) {
                    loadingText.innerText = `サーバーを再起動中... (${attempt}/${maxRetries})`;
                }

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ thought, mode })
                });

                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status}`);
                }

                const data = await response.json();
                renderResult(data);
                loading.style.display = "none";
                btn.disabled = false;
                return; // 成功したら終了

            } catch (error) {
                console.error(`Attempt ${attempt} failed:`, error);
                lastError = error;
                // 30秒待たずに失敗した場合はサーバーが寝ている可能性が高いので、少し待ってリトライ
                if (attempt < maxRetries) {
                    await new Promise(resolve => setTimeout(resolve, 3000)); // 3秒待機
                }
            }
        }

        alert("サーバーの起動に時間がかかっています。しばらくしてから再度お試しください。");
        loading.style.display = "none";
        btn.disabled = false;
    }

    function renderResult(data) {
        document.getElementById('result').style.display = "block";
        document.getElementById('gameNameDisplay').innerText = `${data.game_name} (${data.english_name})`;
        document.getElementById('subjectDisplay').innerText = data.subject_name;
        document.getElementById('targetDisplay').innerText = data.target_name;
        document.getElementById('definitionDisplay').innerText = data.definition;
        document.getElementById('scenarioDisplay').innerText = data.scenario;
        document.getElementById('motiveDisplay').innerText = data.hidden_motive;
        document.getElementById('predictionDisplay').innerText = data.prediction;
        document.getElementById('adviceDisplay').innerText = data.advice;
        document.getElementById('counselingDisplay').innerText = data.counseling.message;

        const start = document.getElementById('posStartDisplay');
        start.innerText = `${data.position_start.self} / ${data.position_start.others}`;
        start.style.backgroundColor = data.position_start.self.includes("not OK") ? "#fdecea" : "#ebf5fb";

        const end = document.getElementById('posEndDisplay');
        end.innerText = `${data.position_end.self} / ${data.position_end.others}`;
        end.style.backgroundColor = data.position_end.self.includes("not OK") ? "#fdecea" : "#ebf5fb";

        window.scrollTo({ top: document.getElementById('result').offsetTop, behavior: 'smooth' });
    }
</script>

</body>
</html>
