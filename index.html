<script>
const API_URL = 'https://game-analysis.onrender.com/';
const MY_PASSWORD = "okok";

// パスワード認証
function checkPassword() {
    const input = document.getElementById('pass-input').value;
    const error = document.getElementById('login-error');
    if(input === MY_PASSWORD){
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        sessionStorage.setItem('isLoggedIn', 'true');
    } else {
        error.classList.remove('hidden');
    }
}

window.onload = () => {
    if(sessionStorage.getItem('isLoggedIn') === 'true'){
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
    }
};

// ここから重要: 安全な fetch + エラー対応
async function analyzeThought(){
    const thought = document.getElementById('user-thought').value.trim();
    if(!thought) return;

    document.getElementById('display-user-thought').innerText = thought;
    document.getElementById('input-section').classList.add('hidden');
    document.getElementById('loading').classList.remove('hidden');

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                thought: thought,
                mode: document.getElementById('mode-toggle').checked ? "strict" : "flexible"
            })
        });

        if(!response.ok){
            throw new Error(`HTTP Error ${response.status}`);
        }

        const text = await response.text();
        let data;
        try{
            data = JSON.parse(text);
        } catch(e){
            throw new Error("APIからJSONが返っていません: " + text);
        }

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('result-section').classList.remove('hidden');

        const getVal = (obj, keys) => {
            if(!obj) return "-";
            for(let key of keys){
                let target = obj[key];
                if(target !== undefined && target !== null && target !== ""){
                    if(typeof target === 'object' && !Array.isArray(target)){
                        return target.message || target.text || target.content || JSON.stringify(target);
                    }
                    return target;
                }
            }
            return "-";
        };

        const setB = (id,val)=>{
            const el = document.getElementById(id);
            if(!el) return;
            const v = String(val || "-").toUpperCase();
            el.innerText = v;
            el.className = 'ok-badge ' + (v.includes('NOT') ? 'badge-not-ok' : v.includes('OK') ? 'badge-ok' : 'badge-none');
        };

        // 以下、既存のデータセット処理をそのまま適用
        // gameNameMap / DOM更新など
        /* ... 省略: 元コードを保持 ... */

    } catch(err){
        console.error(err);
        alert("サーバーへのアクセスでエラーが発生しました。少し待ってから再試行してください。");
        resetDisplay();
    }
}
