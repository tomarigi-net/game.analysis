<!DOCTYPE html>
<html lang="ja">
<head>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests; connect-src 'self' https://game-analysis.onrender.com/ https://game-analysis.onrender.com https://cdn.tailwindcss.com;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理ゲーム・アナライザ Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --game-main: #F0FFF4; --game-accent: #6366f1; --game-dark: #1e293b; }
        body { background-color: var(--game-main); color: var(--game-dark); font-family: sans-serif; }
        .game-card { background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; }
        .ok-badge { padding: 2px 8px; border-radius: 6px; font-weight: bold; font-size: 0.75rem; min-width: 80px; text-align: center; display: inline-block; }
        .badge-ok { background: #dcfce7; color: #166534; }
        .badge-not-ok { background: #fee2e2; color: #991b1b; }
        .speaking { animation: pulse 1.5s infinite; color: #ef4444; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-indigo-700">心理ゲーム・アナライザ</h1>
            <div class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-full border shadow-sm">
                <span class="text-xs font-bold text-gray-500">Flexible</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="mode-toggle" class="sr-only peer">
                    <div class="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-600"></div>
                </label>
                <span class="text-xs font-bold text-indigo-600">Strict</span>
            </div>
        </div>

        <div id="input-section" class="game-card p-6 shadow-xl mb-6">
            <textarea id="user-thought" class="w-full h-40 p-4 border rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none resize-none mb-4 text-gray-700 leading-relaxed" placeholder="ここになにか、モヤモヤするやり取りを入力してください..."></textarea>
            <button onclick="analyzeThought()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2 text-lg">
                <span>深層心理を分析する</span>
            </button>
        </div>

        <div id="loading" class="hidden text-center py-20">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-indigo-500 border-t-transparent mb-4"></div>
            <p class="text-indigo-600 font-medium animate-pulse">魂の曇りを晴らしています...</p>
        </div>

        <div id="result-section" class="hidden space-y-6">
            <div class="flex items-center justify-between">
                <button onclick="resetDisplay()" class="text-sm text-gray-500 hover:text-indigo-600 flex items-center gap-1">
                    ← 前の画面に戻る
                </button>
                <button onclick="speakResult()" id="speak-btn" class="bg-white border p-2 rounded-full shadow-sm hover:bg-gray-50 transition-colors">
                    <span id="speaker-icon" class="text-xl">📢</span>
                </button>
            </div>

            <div class="game-card p-6 shadow-lg border-l-8 border-indigo-500">
                <p id="display-user-thought" class="italic text-gray-500 mb-4 border-b pb-4 leading-relaxed"></p>
                
                <div class="mb-6">
                    <div class="text-xs font-bold text-indigo-400 uppercase tracking-widest mb-1">Identified Game</div>
                    <h2 id="game-name" class="text-3xl font-black text-gray-800 mb-2"></h2>
                    <p id="definition" class="text-sm text-gray-600 leading-relaxed"></p>
                </div>

                <div class="bg-gray-50 p-4 rounded-xl mb-6 border border-dashed">
                    <div class="text-xs font-bold text-gray-400 uppercase mb-2">Social Scenario</div>
                    <p id="scenario" class="text-gray-700 text-sm leading-relaxed"></p>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6 text-center">
                    <div class="bg-white p-3 border rounded-xl">
                        <div class="text-[10px] font-bold text-gray-400 mb-1">STARTING POSITION</div>
                        <div class="flex flex-col gap-1 items-center">
                            <span id="pos-start-self" class="ok-badge"></span>
                            <span id="pos-start-others" class="ok-badge"></span>
                        </div>
                    </div>
                    <div class="bg-white p-3 border rounded-xl relative">
                        <div class="absolute -left-3 top-1/2 -translate-y-1/2 text-gray-300 text-xl">→</div>
                        <div class="text-[10px] font-bold text-gray-400 mb-1">PAYOFF POSITION</div>
                        <div class="flex flex-col gap-1 items-center">
                            <span id="pos-end-self" class="ok-badge"></span>
                            <span id="pos-end-others" class="ok-badge"></span>
                        </div>
                    </div>
                </div>

                <div class="space-y-4 text-sm">
                    <div>
                        <span class="font-bold text-red-500 flex items-center gap-1">⚠️ 予測される破綻した結末</span>
                        <p id="prediction" class="text-gray-700 ml-5"></p>
                    </div>
                    <div>
                        <span class="font-bold text-blue-500 flex items-center gap-1">💡 無意識の真の目的</span>
                        <p id="hidden-motive" class="text-gray-700 ml-5"></p>
                    </div>
                    <div>
                        <span class="font-bold text-green-600 flex items-center gap-1">✅ 健全な交流への回避策</span>
                        <p id="advice" class="text-gray-700 ml-5"></p>
                    </div>
                </div>
            </div>

            <div class="bg-gradient-to-br from-indigo-600 to-purple-600 text-white p-8 rounded-[2rem] shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 right-0 opacity-10 text-9xl transform translate-x-10 -translate-y-10">❝</div>
                <div class="relative">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <span class="bg-white/20 p-1 rounded">心の処方箋</span>
                    </h3>
                    <p id="counseling-msg" class="text-lg leading-relaxed font-medium"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://game-analysis.onrender.com';

        function resetDisplay() {
            document.getElementById('input-section').classList.remove('hidden');
            document.getElementById('result-section').classList.add('hidden');
            document.getElementById('loading').classList.add('hidden');
            window.speechSynthesis.cancel();
        }

        async function analyzeThought() {
            const thought = document.getElementById('user-thought').value.trim();
            if (!thought) return;
            
            document.getElementById('display-user-thought').innerText = thought;
            document.getElementById('input-section').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        "thought": thought,
                        "mode": document.getElementById('mode-toggle').checked ? "strict" : "flexible"
                    })
                });

                if (response.status === 429) {
                    alert("【混雑エラー (429)】\n現在リクエストが集中しています。Gemini APIの制限に達したため、1〜2分待ってから再度お試しください。");
                    resetDisplay();
                    return;
                }

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                let data = await response.json();
                if (typeof data === 'string') data = JSON.parse(data);

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('result-section').classList.remove('hidden');

                // Data mapping
                document.getElementById('game-name').innerText = data.game_name || "不明なゲーム";
                document.getElementById('definition').innerText = data.definition || "";
                document.getElementById('scenario').innerText = data.scenario || "";
                document.getElementById('prediction').innerText = data.prediction || "";
                document.getElementById('hidden-motive').innerText = data.hidden_motive || "";
                document.getElementById('advice').innerText = data.advice || "";
                document.getElementById('counseling-msg').innerText = data.counseling || "";

                // OK Corral logic
                updateBadge('pos-start-self', data.ok_corral?.start?.self);
                updateBadge('pos-start-others', data.ok_corral?.start?.others);
                updateBadge('pos-end-self', data.ok_corral?.end?.self);
                updateBadge('pos-end-others', data.ok_corral?.end?.others);

            } catch (error) {
                console.error("Error:", error);
                alert("エラーが発生しました。接続を確認してください。");
                resetDisplay();
            }
        }

        function updateBadge(id, status) {
            const el = document.getElementById(id);
            if (!status) { el.classList.add('hidden'); return; }
            el.classList.remove('hidden');
            el.innerText = status;
            el.className = 'ok-badge ' + (status.includes('I am OK') ? 'badge-ok' : 'badge-not-ok');
        }

        function speakResult() {
            const btn = document.getElementById('speak-btn');
            const icon = document.getElementById('speaker-icon');
            
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                btn.classList.remove('speaking');
                icon.innerText = "📢";
                return;
            }

            const gameName = document.getElementById('game-name').innerText;
            const definition = document.getElementById('definition').innerText;
            const scenario = document.getElementById('scenario').innerText;
            
            const startSelf = document.getElementById('pos-start-self').innerText;
            const startOthers = document.getElementById('pos-start-others').innerText;
            const endSelf = document.getElementById('pos-end-self').innerText;
            const endOthers = document.getElementById('pos-end-others').innerText;
            
            const prediction = document.getElementById('prediction').innerText;
            const motive = document.getElementById('hidden-motive').innerText;
            const advice = document.getElementById('advice').innerText;
            const counseling = document.getElementById('counseling-msg').innerText;

            const text = `
                分析結果を読み上げます。
                特定された心理ゲームは、${gameName}。
                解説。${definition}。
                やり取りの要約。${scenario}。
                
                開始時の立ち位置。自分は${startSelf}、相手は${startOthers}。
                結末の立ち位置。自分は${endSelf}、相手は${endOthers}。
                
                予測される破綻した結末。${prediction}。
                無意識の利得。${motive}。
                回避策のアドバイス。${advice}。
                心の処方箋。${counseling}。
                以上です。
            `;

            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            uttr.rate = 1.1;

            uttr.onstart = () => {
                btn.classList.add('speaking');
                icon.innerText = "🛑";
            };
            uttr.onend = () => {
                btn.classList.remove('speaking');
                icon.innerText = "📢";
            };
            window.speechSynthesis.speak(uttr);
        }
    </script>
</body>
</html>
