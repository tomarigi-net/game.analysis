<!DOCTYPE html>
<html lang="ja">
<head>
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests; connect-src 'self' https://game-analysis.onrender.com/ https://game-analysis.onrender.com https://cdn.tailwindcss.com;">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心理ゲーム・アナライザ Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* ... 既存のCSSはそのまま ... */
</style>
</head>
<body class="min-h-screen pb-12">

<!-- ログイン画面 -->
<div id="login-screen" class="max-w-md mx-auto px-4 py-12">
  <!-- 省略：既存のlogin-card内容そのまま -->
</div>

<!-- メイン画面 -->
<div id="main-content" class="hidden">
  <div class="max-w-2xl mx-auto px-4 py-10">
    <!-- 入力セクション -->
    <div id="input-section" class="space-y-4">
      <!-- 既存の入力フォーム・モード切替・説明など -->
    </div>

    <!-- ローディング -->
    <div id="loading" class="hidden text-center py-16">
      <div class="typing-loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <p class="mt-6 text-indigo-800 font-bold animate-pulse">深層心理をスキャン中...</p>
    </div>

    <!-- 結果表示 -->
    <div id="result-section" class="hidden space-y-6 fade-in">
      <!-- 既存のgame-card、予測、回避策、処方箋表示など -->
    </div>
  </div>
</div>

<script>
const API_URL = 'https://game-analysis.onrender.com';
const MY_PASSWORD = "okok";

function checkPassword() {
  const input = document.getElementById('pass-input').value.trim();
  const error = document.getElementById('login-error');
  if(input === MY_PASSWORD){
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('main-content').classList.remove('hidden');
    sessionStorage.setItem('isLoggedIn','true');
  } else {
    error.classList.remove('hidden');
  }
}

window.onload = () => {
  if(sessionStorage.getItem('isLoggedIn') === 'true'){
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('main-content').classList.remove('hidden');
  }
};

function toggleManual(){
  const content=document.getElementById('manual-content');
  const icon=document.getElementById('manual-icon');
  content.classList.toggle('hidden');
  icon.style.transform = content.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
}

function toggleOriginalText(){
  const container=document.getElementById('original-text-container');
  const icon=document.getElementById('accordion-icon');
  container.classList.toggle('hidden');
  icon.style.transform = container.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
}

function resetDisplay(){
  if(window.speechSynthesis.speaking) window.speechSynthesis.cancel();
  document.getElementById('result-section').classList.add('hidden');
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('input-section').classList.remove('hidden');
  document.getElementById('original-text-container').classList.add('hidden');
  document.getElementById('accordion-icon').style.transform = 'rotate(0deg)';
  window.scrollTo(0,0);
}

async function analyzeThought(){
  let thought = document.getElementById('user-thought').value.trim();
  if(!thought) return;

  document.getElementById('display-user-thought').innerText = thought;
  document.getElementById('input-section').classList.add('hidden');
  document.getElementById('loading').classList.remove('hidden');

  try {
    const response = await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        thought,
        mode: document.getElementById('mode-toggle').checked ? 'strict':'flexible'
      })
    });

    if(!response.ok){
      throw new Error(`HTTP error ${response.status}`);
    }

    let data = await response.json();
    if(typeof data === 'string') data = JSON.parse(data);

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('result-section').classList.remove('hidden');

    // getVal, setB, gameNameMap など既存コードをそのまま利用
    // ここでJSONの各値を画面に反映
    // 省略：既存のDOM操作部分

  } catch(err){
    console.error(err);
    alert("現在アクセスが集中しているか、リクエスト制限がかかっています。数分置いてから再度お試しください。");
    resetDisplay();
  }
}

function speakResult(){
  const btn=document.getElementById('read-aloud-btn');
  const icon=document.getElementById('speaker-icon');
  if(window.speechSynthesis.speaking){
    window.speechSynthesis.cancel();
    btn.classList.remove('speaking');
    icon.innerText="🔊";
    return;
  }
  // 音声読み上げ部分そのまま
}
</script>
</body>
</html>
