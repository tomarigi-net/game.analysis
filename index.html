<!DOCTYPE html>
<html lang="ja">
<head>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests; connect-src 'self' https://game-analysis.onrender.com/ https://game-analysis.onrender.com https://cdn.tailwindcss.com;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理ゲーム・アナライザ Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --game-main: #F0FFF4; --game-accent: #6366f1; --game-dark: #1e293b; }
        body { background-color: var(--game-main); color: var(--game-dark); font-family: sans-serif; }
        .game-card { background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; }
        .ok-badge { padding: 2px 8px; border-radius: 6px; font-weight: bold; font-size: 0.75rem; min-width: 80px; text-align: center; display: inline-block; }
        .badge-ok { background: #dcfce7; color: #166534; }
        .badge-not-ok { background: #fee2e2; color: #991b1b; }
        .badge-none { background: #f1f5f9; color: #94a3b8; }
        .hidden { display: none !important; }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #6366f1; }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body class="min-h-screen pb-12">
    <div id="login-screen" class="max-w-md mx-auto px-4 py-12">
        <div class="game-card shadow-2xl p-8 border-t-4 border-indigo-500">
            <h1 class="text-2xl font-black text-indigo-900 mb-6 text-center">心理ゲーム・アナライザ</h1>
            <input type="password" id="pass-input" class="w-full p-4 border rounded-2xl mb-4 text-center outline-none bg-slate-50" placeholder="パスワードを入力">
            <button onclick="checkPassword()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition">分析を開始する</button>
            <p id="login-error" class="text-rose-500 text-sm mt-4 hidden text-center">パスワードが正しくありません</p>
        </div>
    </div>

    <div id="main-content" class="hidden max-w-2xl mx-auto px-4 py-10">
        <div id="input-section" class="game-card shadow-xl p-8 space-y-6 border-t-4 border-indigo-500">
            <div class="flex items-center justify-between bg-slate-50 p-4 rounded-2xl">
                <span class="font-bold text-slate-700 text-sm">エリック・バーン限定モード</span>
                <label class="switch"><input type="checkbox" id="mode-toggle" checked><span class="slider"></span></label>
            </div>
            <textarea id="user-thought" class="w-full h-40 p-4 border rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none" placeholder="やり取りを入力..."></textarea>
            <button onclick="analyzeThought()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg">深層心理を分析する</button>
        </div>

        <div id="loading" class="hidden text-center py-16 animate-pulse">分析中...</div>

        <div id="result-section" class="hidden space-y-6 mt-8">
            <div class="game-card p-6 border-l-8 border-indigo-600">
                <h3 id="game-name" class="text-2xl font-black text-indigo-900"></h3>
                <p id="game-definition" class="text-sm text-slate-500 italic mt-2"></p>
                <p id="game-scenario" class="text-sm text-slate-700 mt-2 bg-slate-50 p-3 rounded-lg border"></p>
            </div>
            <div class="bg-slate-900 text-white rounded-3xl p-8 shadow-2xl">
                <h3 class="text-indigo-400 text-sm font-bold mb-3">⚠️ 結末の予測</h3>
                <p id="prediction" class="text-xl font-bold"></p>
            </div>
            <div class="bg-emerald-50 border border-emerald-200 rounded-2xl p-6">
                <h3 class="font-bold text-emerald-800 mb-2">💡 回避策</h3>
                <p id="advice" class="text-emerald-900 font-bold"></p>
            </div>
            <button onclick="resetDisplay()" class="w-full py-6 text-slate-400 font-bold">入力画面に戻る</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://game-analysis.onrender.com/';
        const MY_PASSWORD = "okok";

        function checkPassword() {
            const input = document.getElementById('pass-input').value;
            if (input === MY_PASSWORD) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                sessionStorage.setItem('isLoggedIn', 'true');
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        window.onload = () => {
            if (sessionStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            }
        };

        function resetDisplay() {
            document.getElementById('user-thought').value = "";
            document.getElementById('result-section').classList.add('hidden');
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('input-section').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        async function analyzeThought() {
            const thought = document.getElementById('user-thought').value.trim();
            if (!thought) return;
            document.getElementById('input-section').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        "thought": thought,
                        "mode": document.getElementById('mode-toggle').checked ? "strict" : "flexible"
                    })
                });
                const data = await response.json();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('result-section').classList.remove('hidden');
                
                const getV = (o, k) => {
                    for (let x of k) { if (o && o[x]) return o[x]; }
                    return "-";
                };

                document.getElementById('game-name').innerText = getV(data, ['game_name', '心理ゲーム']);
                document.getElementById('game-definition').innerText = getV(data, ['definition', '解説']);
                document.getElementById('game-scenario').innerText = getV(data, ['scenario', '要約']);
                document.getElementById('prediction').innerText = getV(data, ['prediction', '予測']);
                document.getElementById('advice').innerText = getV(data, ['advice', '回避策']);
            } catch (err) {
                alert("エラーが発生しました。");
                resetDisplay();
            }
        }
    </script>
</body>
</html>
